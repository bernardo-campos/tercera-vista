<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desbloquea las Figuras</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="main-container">
        <div class="game-column">
            <div class="header">
                <h1>Desbloquea las Figuras</h1>
                <p>Encuentra las figuras ocultas</p>
            </div>

            <div class="figure-wrapper">
                <div class="figure-grid" id="figureGrid">
                    <canvas id="lineCanvas"></canvas>
                    <!-- Points generated by JS -->
                </div>
            </div>

            <div class="controls">
                <div id="messageArea" class="message-area">Dibuja una figura</div>
                <button id="resetBtn" class="btn-reset">Borrar Progreso</button>
            </div>
        </div>

        <div class="list-column">
            <div class="list-header">
                <h2>Colección <span id="progressCount">0/0</span></h2>
            </div>
            <div id="figureList" class="figure-list">
                <!-- List items generated by JS -->
            </div>
            <div class="list-footer">
                <button id="showSolutionsBtn" class="btn-solutions">Ver todas las soluciones</button>
            </div>
        </div>
    </div>

    <div id="solutionsModal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close-modal">&times;</span>
            <h2>Todas las Soluciones</h2>
            <div id="solutionsGrid" class="solutions-grid"></div>
        </div>
    </div>

    <script type="module" src="js/script.js"></script>
</body>
</html>
