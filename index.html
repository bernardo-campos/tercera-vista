<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio de Terceras Vistas</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="intro-page">
    <main class="intro-shell">
        <section class="intro-copy" aria-labelledby="introTitle">
            <!-- <p class="intro-kicker">Dibujo tecnico</p> -->
            <h1 id="introTitle">Encuentra la tercera vista</h1>
            <p>
                Observa las vistas superior y frontal en el dibujo. Encontrar una solución para la tercera vista es fácil, pero...
            </p>
            <p>
                ¿Puedes encontrar todas las soluciones?
            </p>
            <a class="btn-play" href="game.html">Jugar</a>
        </section>

        <section class="intro-board" aria-label="Disposicion de vistas y lineas de referencia">
            <svg class="projection-sheet" viewBox="0 0 620 560" role="img" aria-labelledby="projectionTitle projectionDesc">
                <title id="projectionTitle">Sistema de vistas ortogonales</title>
                <desc id="projectionDesc">
                    Vista frontal y superior apiladas a la izquierda, con lineas de referencia hacia el espacio donde se busca la tercera vista.
                </desc>

                <g class="projection-guides">
                    <path class="axis axis-horizontal" d="M44 260 H585" />
                    <path class="axis axis-vertical" d="M318 40 V525" />

                    <path d="M82 260 V462" />
                    <path d="M254 260 V462" />
                    <path d="M255 88 H373" />
                    <path d="M255 174 H550" />

                    <path d="M318 324 L382 260" />
                    <path d="M318 410 L468 260" />
                    <path d="M318 496 L554 260" />

                    <path d="M254 324 H318" />
                    <path d="M254 410 H318" />
                    <path d="M254 496 H318" />
                </g>

                <g class="given-view front-view" aria-label="Vista frontal">
                    <text x="82" y="70">Vista frontal</text>
                    <rect x="82" y="88" width="172" height="86" />
                    <rect x="82" y="174" width="172" height="86" />
                </g>

                <g class="given-view top-view" aria-label="Vista superior">
                    <text x="82" y="306">Vista superior</text>
                    <rect x="82" y="324" width="172" height="86" />
                    <rect x="82" y="410" width="172" height="86" />
                </g>

                <g class="third-zone" aria-label="Zona donde se busca la tercera vista">
                    <text x="384" y="74">Tercera vista</text>
                    <rect x="378" y="88" width="172" height="172" />
                    <path d="M465 88 V260" />
                    <text class="unknown-mark" x="438" y="410">?</text>
                </g>
            </svg>
        </section>
    </main>
</body>
</html>
